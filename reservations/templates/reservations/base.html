<!-- reservations/templates/reservations/base.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SportField — {% block title %}Accueil{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">
</head>
<body>
  {% load static %}


<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
      <img src="{% static 'images/logo.png' %}" width="100" alt="">
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{% url 'terrain_list' %}">Terrains</a>
      <a class="nav-link" href="{% url 'calendrier' %}">Calendrier</a>
      <a class="nav-link" href="{% url 'joueur_add' %}">S'inscrire</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
